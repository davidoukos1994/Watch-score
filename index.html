<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Watch Score</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="top">
      <div class="timer">
        <span id="clock">00:00</span>
        <button id="timerBtn" class="small">▶</button>
      </div>
      <button id="resetBtn" class="small danger">Νέος</button>
    </section>

    <section class="setup" id="setup">
      <input id="teamAInput" placeholder="Ομάδα Α" value="Ολυμπιακός" />
      <input id="teamBInput" placeholder="Ομάδα Β" value="Παναθηναϊκός" />
      <button id="startBtn">Έναρξη αγώνα</button>
    </section>

    <section class="scoreboard">
      <div class="team">
        <input id="teamAName" class="teamName" value="Ολυμπιακός" />
        <div id="scoreA" class="score">0</div>
        <button id="goalA" class="goal">+ Γκολ</button>
        <div class="cards">
          <button id="yellowA">🟨</button>
          <button id="redA">🟥</button>
        </div>
      </div>

      <div class="vs">-</div>

      <div class="team">
        <input id="teamBName" class="teamName" value="Παναθηναϊκός" />
        <div id="scoreB" class="score">0</div>
        <button id="goalB" class="goal">+ Γκολ</button>
        <div class="cards">
          <button id="yellowB">🟨</button>
          <button id="redB">🟥</button>
        </div>
      </div>
    </section>

    <section class="logWrap">
      <h2>Γκολ / Κάρτες</h2>
      <div id="log" class="log"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="box">
      <h3 id="modalTitle">Σκόρερ</h3>
      <input id="scorerInput" placeholder="Όνομα σκόρερ" />
      <div class="row">
        <button id="saveScorer">OK</button>
        <button id="cancelScorer" class="danger">Άκυρο</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
